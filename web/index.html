<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local AI Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" id="brandMark"></div>
        <div>
          <div class="brand-title">Local AI Hub</div>
          <div class="brand-sub">Everything runs on your machine</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-guide" id="guideBtn" title="Open the Getting Started guide"><span class="gb-icon"></span>Getting Started</button>
        <button class="btn-guide" id="aboutBtn" title="About &amp; links"><span class="gb-icon"></span>About</button>
        <button class="icon-btn" id="setupBtn" title="Setup check" aria-label="Setup check"></button>
        <button class="icon-btn" id="rescanBtn" title="Rescan for models" aria-label="Rescan for models"></button>
        <button class="theme-toggle" id="themeToggle" title="Toggle light / dark" aria-label="Toggle theme">
          <span id="sunIcon"></span>
          <span id="moonIcon"></span>
          <span class="knob"></span>
        </button>
      </div>
    </header>

    <main class="cards" id="cards"></main>

    <section class="browse">
      <div class="browse-head">Browse &amp; download models</div>
      <div class="browse-row">
        <a class="browse-link" data-url="https://ollama.com/library" data-icon="library">Ollama Library</a>
        <a class="browse-link" data-url="https://huggingface.co/models" data-icon="hugging">Hugging Face</a>
        <a class="browse-link" data-url="https://civitai.com" data-icon="civitai">Civitai</a>
      </div>
    </section>

    <div class="footer-note">Local-only · No accounts · No telemetry · Nothing phones home</div>
    <div class="footer-links">
      <a class="foot-link" data-act="open" data-url="mailto:hello@kamsiob.com">Questions or suggestions? hello@kamsiob.com</a>
      <span class="foot-sep">·</span>
      <a class="foot-link" data-act="open" data-url="https://github.com/kamsiob">GitHub</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="app.js"></script>
</body>
</html>
